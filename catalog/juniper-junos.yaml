# ── Vendor identity ────────────────────────────────────────────────
vendor: juniper_junos
display_name: "Juniper Junos OS (EX / QFX)"
manufacturer: "Juniper Networks"
product_family: "EX Series / QFX Series switching"
notes: |
  Catalog covers Juniper EX Series and QFX Series switches running Junos OS.
  MX Series routers are explicitly out of scope — they share Junos but the
  switching command surface (ethernet-switching family, IRB, ELS) is what
  NetCaster cares about.

  Junos's CLI is fundamentally hierarchical and transactional, NOT imperative
  like Cisco IOS / Aruba AOS-CX:

    - Operational mode is `>` prompt; `show` commands run here.
    - Configuration mode is `#` prompt (`configure` to enter, `exit` to leave).
    - Config edits build a CANDIDATE config; nothing applies until `commit`.
    - Most "writes" are `set <hierarchy> ...` or `delete <hierarchy> ...`
      statements, not single-line action commands.
    - There is no `running-config` vs `startup-config` distinction — `commit`
      is the only persistence step. See SAVE_CONFIG entry.
    - Pipe filters are richer: `| display set`, `| display xml`, `| match`,
      `| count`, `| no-more`. NetCaster collectors should standardize on
      `| no-more` (suppress pager) and `| display set` for config introspection.

  ELS (Enhanced Layer 2 Software) vs non-ELS matters for VLAN / interface
  config syntax. Modern EX (EX2300, EX3400, EX4100, EX4300, EX4400, EX4600,
  EX9200) and all QFX run ELS. Legacy non-ELS EX (EX2200, EX3200, EX4200
  on older Junos) used a different hierarchy. **This catalog targets ELS**;
  non-ELS variants are flagged in `notes` where they materially differ.

  Junos has FIRST-CLASS NETCONF support — it's the native programmatic
  interface and is enabled by default on most platforms (just need to add
  `set system services netconf ssh`). YANG models come in three flavors:
    - Junos-native config models (`junos-conf-*`) — reflect the Junos
      config hierarchy 1:1.
    - Junos-native RPC models (`junos-rpc-*`) — wrap operational `show`
      commands.
    - OpenConfig models (`openconfig-*`) — vendor-neutral, mapped onto
      the Junos config tree by an internal translator.

  Junos OS Evolved (JOEv, on QFX5130/5220/5700, PTX, ACX) is a separate
  but largely command-compatible variant. Treat as same surface for v1;
  flag JOEv-only variations as they're discovered.

  Interface naming: `ge-0/0/24` (1G), `xe-0/0/1` (10G), `et-0/0/0` (40/100G),
  `mge-0/0/0` (multi-rate 1/2.5/5/10G), `ae0` (aggregated ethernet / LAG).
  `unit 0` is the default logical sub-interface; family ethernet-switching
  always lives on unit 0 for switch ports.

