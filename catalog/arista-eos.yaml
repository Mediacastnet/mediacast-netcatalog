# ── Vendor identity ────────────────────────────────────────────────
vendor: arista_eos
display_name: "Arista EOS"
manufacturer: "Arista Networks"
product_family: "Arista 7000 / 7100 / 7200 / 7300 / 7500 / 7800 (DCS / CCS) — campus + datacenter"
notes: |
  Arista EOS is **deliberately Cisco-IOS CLI compatible** for the bulk
  of show/config commands NetCaster cares about. Most read commands
  here (`show arp`, `show mac address-table`, `show interfaces ...`,
  `show vlan`, `show spanning-tree`, `show running-config`) are
  byte-for-byte identical at the user level to Cisco IOS-XE, with the
  same column layouts, the same `xxxx.xxxx.xxxx` MAC dotted-quad
  format, and the same headers — meaning a parser written against
  IOS-XE typically works against EOS with only minor adjustment.

  **Key divergence for parsers:** interface naming. Arista uses
  `Ethernet24`, `Ethernet3/1`, `Ethernet1/1/1`, or the short form
  `Et24` / `Et3/1`. There is no `GigabitEthernet1/0/24` or similar
  speed-prefixed name. Port-channels are `Port-Channel1` (or `Po1`).
  SVIs are `Vlan100` (or `Vl100`). The catalog assumes the long form
  in `cli` strings.

  **Programmatic interfaces:**
  - **eAPI** is Arista's flagship programmatic API — JSON-RPC 2.0 over
    HTTPS (default port 443; HTTP/80 also available). Method is always
    `runCmds` and takes a list of CLI commands; output `format` can be
    `"json"` (structured) or `"text"` (raw `show` output). This is a
    4th protocol slot alongside NETCONF/RESTCONF/gNMI and the catalog
    extends `protocol_alternatives` with an `eapi:` block where the
    structured form is well-supported. eAPI is enabled with
    `management api http-commands` / `no shutdown`.
  - **gNMI** is supported via the OpenConfig agent (ManagementActive
    `Octa` mode for OpenConfig+TerminAttr). Default port 6030.
    OpenConfig paths are first-class; native EOS Sysdb/Smash paths are
    also accessible via the `eos_native` origin.
  - **NETCONF/RESTCONF** are supported but de-emphasized in Arista's
    own positioning; gNMI + eAPI are the common picks. NETCONF runs on
    TCP/830, RESTCONF on TCP/6020.

  **Persistence:** identical to Cisco IOS — `copy running-config
  startup-config` or `write memory`. Commits are immediate; no
  Junos-style two-stage commit.

  **Spanning-tree default:** EOS defaults to **MSTP** (not PVST+).
  Per-VLAN STP requires `spanning-tree mode rapid-pvst` first; the
  per-VLAN-enable command is `spanning-tree vlan-id <X>` (note the
  `-id` suffix — IOS uses `spanning-tree vlan <X>` without `-id`,
  which is one of the few real CLI divergences from Cisco).

  Baseline firmware: EOS **4.32+** (mid-2024 forward) is what this
  catalog targets. Earlier versions (4.20–4.31) share command surface
  for the abstract types in scope.

