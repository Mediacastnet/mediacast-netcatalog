        url_path: "/restconf/data/Cisco-IOS-XE-interfaces-oper:interfaces/interface={name}"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-interfaces-oper:interfaces/interface[name={name}]"
        firmware_required: ">=17.3"

  - type: CIVIC_LOCATION
    description: "LLDP-MED civic location identifier definitions (used for drop-ID resolution)"
    versions:
      - applies_to: ">=15.0"
        cli: "show running-config | section ^location"
        sample_output: |
          location civic-location identifier 1
           building "Main"
           floor "2"
           room "203"
           name "Drop-101"
           additional-location-information "AP cluster A"
          !
          location civic-location identifier 2
           building "Annex"
           floor "1"
           name "Drop-Reception"
          !
        parser_notes: |
          Splits on `(?=^location civic-location identifier\s)`
          MULTILINE. Per-block: prefer the `name` field (Cisco's
          free-form drop-ID slot); fall back to `building / floor /
          room` concatenation; finally `additional-location-information`.
          Handler returns dict of identifier → human-readable string.
        config_required: ""
        notes: |
          NetCaster uses civic-location-id on each access port (set
          via `location civic-location-id <n>` in interface config)
          as a venue-friendly "drop ID" — the human label of where a
          port physically lands. Handler resolves the ID via
          `enrich_civic_locations`.

          IOS classic 12.x has the same syntax but `| section` is
          unavailable; use `show running-config | include
          civic-location` and a wider parse.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/location/civic-location"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/location/civic-location"
        firmware_required: ">=16.6.1"
      gnmi: null

  - type: VLAN_LIST
    description: "List of VLANs on the switch"
    versions:
      - applies_to: ">=12.0"
        cli: "show vlan brief"
        sample_output: |
          VLAN Name                             Status    Ports
          ---- -------------------------------- --------- -------------------------------
          1    default                          active    Gi1/0/1, Gi1/0/2, Gi1/0/3
          10   DATA                             active    Gi1/0/4, Gi1/0/5
          20   VOICE                            active
          30   AP                               active
          99   MGMT                             active    Gi1/0/48
          1002 fddi-default                     act/unsup
          1003 token-ring-default               act/unsup
          1004 fddinet-default                  act/unsup
          1005 trnet-default                    act/unsup
        parser_notes: |
          Regex anchors on `^(\d+)\s+(\S+)\s+(active|sus|act/unsup)`.
          Skip the reserved range 1002–1005 and VLAN 1 (default —
          NetCaster doesn't surface it as a venue-managed VLAN).
        config_required: ""
        notes: |
          VLANs may be defined but with no member ports listed in the
          Ports column — that's normal (VLANs without trunk/access
          assignments still appear). The handler relies on this.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-vlan-oper"
        data_path: "/vlans/vlan"
        firmware_required: ">=16.8.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-vlan-oper:vlans"
        firmware_required: ">=16.8.1"
      gnmi:
        path: "/Cisco-IOS-XE-vlan-oper:vlans"
        firmware_required: ">=17.3"

  - type: SVI_CONFIG
    description: "SVI / VLAN interface running-config sections"
    versions:
      - applies_to: ">=15.0"
        cli: "show running-config | section interface Vlan"
        sample_output: |
          interface Vlan1
           no ip address
           shutdown
          !
          interface Vlan10
           description DATA-VLAN
           ip address 10.1.10.1 255.255.255.0
           ip helper-address 10.1.1.10
           ip helper-address 10.1.1.11
          !
          interface Vlan30
           description AP-VLAN
           ip address 10.1.30.1 255.255.255.0
           ip helper-address 10.1.1.10
           ip pim sparse-mode
        parser_notes: |
          Splits on `(?=^interface Vlan)` MULTILINE. Per-block
          extracts: ip address (IP + mask → CIDR), shutdown sentinel,
          ip helper-address (multiple), ip igmp / ip pim sparse-mode.
          Maps each block back into the `vlan_map` keyed by VLAN ID.
        config_required: ""
        notes: |
          Note that `interface Vlan` matches "interface Vlan1" through
          "interface Vlan4094" — the regex relies on the VLAN ID being
          captured from the header line, not on a delimiter.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/Vlan"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/Vlan"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/Vlan"
        firmware_required: ">=17.3"

  - type: STP_VLAN_LIST
    description: "List of VLANs with spanning-tree enabled"
    versions:
      - applies_to: ">=12.0"
        cli: "show spanning-tree vlan"
        sample_output: |
          VLAN0010
            Spanning tree enabled protocol rstp
            Root ID    Priority    32778
                       Address     001b.5377.fbe1
                       Cost        4
                       Port        49 (GigabitEthernet1/0/49)
                       Hello Time   2 sec  Max Age 20 sec  Forward Delay 15 sec

            Bridge ID  Priority    32778  (priority 32768 sys-id-ext 10)
                       Address     001b.5377.fbe1
                       Hello Time   2 sec  Max Age 20 sec  Forward Delay 15 sec
                       Aging Time  300 sec

          Interface           Role Sts Cost      Prio.Nbr Type
          ------------------- ---- --- --------- -------- --------------------------------
          Gi1/0/1             Desg FWD 4         128.1    P2p Edge
          Gi1/0/49            Root FWD 4         128.49   P2p
        parser_notes: |
          Header lines `^VLAN(\d+)$` reveal which VLANs participate.
          NetCaster's parser collects the set of VLAN IDs that show
          up in this output as the "STP-enabled" set, and compares it
          against the venue's expected VLAN list to find STP-missing
          VLANs.
        config_required: ""
        notes: |
          By default STP runs on all defined VLANs (PVST+ / Rapid-PVST+).
          A VLAN appears in this output only when there's at least one
          access port carrying it OR a trunk allowing it — empty VLANs
          are silent. NetCaster accounts for this when computing the
          STP-coverage diff.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-spanning-tree-oper"
        data_path: "/stp-details/stp-detail"
        firmware_required: ">=16.9.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-spanning-tree-oper:stp-details"
        firmware_required: ">=16.9.1"
      gnmi:
        path: "/Cisco-IOS-XE-spanning-tree-oper:stp-details"
        firmware_required: ">=17.3"

  - type: HARDWARE_IDENTITY
    description: "Composite: chassis serial(s), base MAC, stack member serials"
    versions:
      - applies_to: ">=15.0"
        cli: |
          show inventory
          show version
        sample_output: |
          # ── show inventory ──
          NAME: "c93xx Stack", DESCR: "c93xx Stack"
          PID: C9300-48UXM      , VID: P2B  , SN: FCW2117G00C

          NAME: "Switch 1", DESCR: "C9300-48UXM"
          PID: C9300-48UXM      , VID: P2B  , SN: FCW2117G00B

          NAME: "Switch 2", DESCR: "C9300-48UXM"
          PID: C9300-48UXM      , VID: P2B  , SN: FCW2117G00C

          NAME: "Switch 1 - Power Supply A", DESCR: "Switch 1 - Power Supply A"
          PID: PWR-C1-1100WAC   , VID: V02  , SN: LIT211227NZ

          NAME: "Switch 1 FRU Uplink Module 1", DESCR: "8x10G Uplink Module"
          PID: C3850-NM-8-10G   , VID: V01  , SN: FOC20153M58

          # ── show version ──
          Cisco IOS XE Software, Version 17.12.04
          Cisco IOS Software [Dublin], Catalyst L3 Switch Software (CAT9K_IOSXE), Version 17.12.4

          ROM: IOS-XE ROMMON
          BOOTLDR: System Bootstrap, Version 17.12.1r [FC1], RELEASE SOFTWARE (P)

          switch uptime is 21 weeks, 3 days, 4 hours, 12 minutes
          Uptime for this control processor is 21 weeks, 3 days, 4 hours, 14 minutes
          System returned to ROM by Power Failure
          System restarted at 12:34:56 UTC Mon Jan 6 2025
          System image file is "flash:packages.conf"

          Technology Package License Information:
          ...

          Switch Ports Model              SW Version        SW Image              Mode
          ------ ----- -----              ----------        --------              ----
               1    52 C9300-48UXM        17.12.4           CAT9K_IOSXE           INSTALL
               2    52 C9300-48UXM        17.12.4           CAT9K_IOSXE           INSTALL

          Configuration register is 0x102

          Base Ethernet MAC Address       : AA:BB:CC:00:01:00
          Motherboard Assembly Number     : 73-18272-04
          Motherboard Serial Number       : FCW2117G00B
          Model Revision Number           : P2B
          Motherboard Revision Number     : A0
          Model Number                    : C9300-48UXM
          System Serial Number            : FCW2117G00B
        parser_notes: |
          Composite operation. Handler's `get_hardware_identity`:

          Step 1 — `show inventory`:
            Split on `\n(?=NAME:)`. For each block, match
            NAME: "..." — keep blocks where NAME contains
            "Chassis", "Switch <n>", or "Stack".
            Extract SN: <token>. Dedupe + sort. First entry =
            primary serial; full list = stack_member_serials.

          Step 2 — `show version` (fallback + base MAC):
            If inventory yielded zero serials, fall back to
            `Processor board ID` / `System serial number` lines.
            ALWAYS extract base MAC from
            `Base (?:ethernet )?MAC Address\s*[:\s]\s*(<mac>)`,
            normalized to colon-separated lowercase.
        config_required: ""
        notes: |
          IOS-XE 17.x emits "Base Ethernet MAC Address" with a colon
          separator; some 16.x trains emit it as "Base Ethernet MAC
          Address(es): AABB.CC00.0100" (Cisco-dotted, plural). The
          existing handler regex covers both via `(?:[:\.-]...)`.
          The `Processor board ID` field is the historical-IOS form;
          IOS-XE prefers `System Serial Number`.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-device-hardware-oper"
        data_path: "/device-hardware-data/device-hardware/device-system-data"
        firmware_required: ">=16.8.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-device-hardware-oper:device-hardware-data"
        firmware_required: ">=16.8.1"
      gnmi:
        path: "/Cisco-IOS-XE-device-hardware-oper:device-hardware-data"
        firmware_required: ">=17.3"

  - type: HOSTNAME
    description: "The switch's configured hostname"
    versions:
      - applies_to: ">=12.0"
        cli: "show running-config | include ^hostname"
        sample_output: |
          hostname switch-edge-12
        parser_notes: |
          Single-line match `^hostname\s+(\S+)`. Note the existing
          handler reads hostname from the netmiko prompt instead
          (`find_prompt()` → strip trailing `>` or `#`) — this is
          faster and avoids a second show. Catalog records the
          explicit-show alternative for completeness.
        config_required: ""
        notes: |
          Hostname is also embedded in `show version` output:
          `<hostname> uptime is ...`. Either source works; prompt
          is the cheapest.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/hostname"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/hostname"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/hostname"
        firmware_required: ">=17.3"

  - type: VERSION
    description: "Firmware version string — drives catalog version-aware selection"
    versions:
      - applies_to: ">=12.0"
        cli: "show version"
        sample_output: |
          Cisco IOS XE Software, Version 17.12.04
          Cisco IOS Software [Dublin], Catalyst L3 Switch Software (CAT9K_IOSXE), Version 17.12.4, RELEASE SOFTWARE (fc1)
          Technical Support: http://www.cisco.com/techsupport
          Copyright (c) 1986-2024 by Cisco Systems, Inc.
          Compiled Thu 14-Mar-24 09:12 by mcpre
        parser_notes: |
          Two patterns to match (in order of preference):
            1. IOS-XE: `Cisco IOS XE Software, Version (\S+)`
               → captures e.g. "17.12.04"
            2. IOS classic: `Cisco IOS Software, .*?Version (\S+),`
               → captures e.g. "15.2(7)E5"
          Strip any trailing comma. Normalize to dotted form
          (the IOS-classic "15.2(7)E5" form needs a parser-specific
          version comparator — capture as-is for now).

          Also worth capturing from this output:
            - Platform/family: e.g. "CAT9K_IOSXE", "C3850 Software"
            - Train name: "Dublin", "Cupertino", "Bengaluru" etc.
        config_required: ""
        notes: |
          CRITICAL for the catalog itself — every other command's
          version-range matching depends on parsing this string
          first. Keep parser conservative: if both patterns fail,
          treat as "unknown" and fall back to the wildcard `*`
          version block. The fingerprint also feeds platform
          detection in `_fingerprint_via_show_version`.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-install-oper"
        data_path: "/install-oper-data/install-location-information"
        firmware_required: ">=16.10.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-install-oper:install-oper-data"
        firmware_required: ">=16.10.1"
      gnmi:
        path: "/Cisco-IOS-XE-install-oper:install-oper-data"
        firmware_required: ">=17.3"

  # ── Write operations — port-level ──────────────────────────────
  - type: PORT_SHUTDOWN
    description: "Administratively disable an interface"
    versions:
      - applies_to: ">=12.0"
        cli: |
          interface {interface}
          shutdown
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          Sent in config mode (netmiko `send_config_set`).
          Failure mode: the engine NEVER retries write operations;
          if config-set raises, the operator sees the error and the
          port stays in whatever state the device is in.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/{type}/{name}/shutdown"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/{type}={name}/shutdown"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/{type}[name={name}]/shutdown"
        firmware_required: ">=17.3"

  - type: PORT_NO_SHUTDOWN
    description: "Administratively enable an interface"
    versions:
      - applies_to: ">=12.0"
        cli: |
          interface {interface}
          no shutdown
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          Pair with PORT_SHUTDOWN to implement port-cycle
          (shutdown → wait → no shutdown). NetCaster's port-cycle
          flow waits ~3s between the two writes.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/{type}/{name}/shutdown"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/{type}={name}/shutdown"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/{type}[name={name}]/shutdown"
        firmware_required: ">=17.3"

  - type: PORT_VLAN_ASSIGN
    description: "Set the access VLAN of an interface (with edge-port hardening)"
    versions:
      - applies_to: ">=12.0"
        cli: |
          interface {interface}
          switchport access vlan {vlan_id}
          spanning-tree portfast
          spanning-tree bpduguard enable
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          NetCaster's VLAN-assign always layers in portfast +
          BPDU guard — these are edge-port-safe defaults, and the
          composite is what the existing handler emits today
          (see `get_vlan_assign_commands`).

          The interface should already be in `switchport mode access`;
          if it's not (e.g., default L3 on a router image), the
          `switchport access vlan` line silently no-ops. NetCaster's
          clean-port find filters non-access ports out before write,
          so this is rarely a real issue, but worth noting.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/{type}/{name}/switchport/access/vlan/vlan"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/{type}={name}/switchport-config/switchport/access/vlan"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/{type}[name={name}]/switchport/access/vlan/vlan"
        firmware_required: ">=17.3"

  - type: PORT_POE_OFF
    description: "Disable PoE on an interface"
    versions:
      - applies_to: ">=12.2"
        cli: |
          interface {interface}
          power inline never
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          Cisco doc warning: when a Cisco powered device is
          connected and you flip to `power inline never`, a
          false link-up can put the port into err-disable.
          NetCaster's PoE-cycle flow uses `power inline never`
          → wait → `power inline auto`, which is the standard
          PoE power-cycle pattern; if err-disable trips, the
          subsequent `no shutdown` recovers it.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/{type}/{name}/power/inline"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/{type}={name}/power/inline"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/{type}[name={name}]/power/inline"
        firmware_required: ">=17.3"

  - type: PORT_POE_ON
    description: "Enable PoE on an interface (default-on)"
    versions:
      - applies_to: ">=12.2"
        cli: |
          interface {interface}
          power inline auto
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          `auto` is the IOS default for PoE-capable ports — this
          command is effectively idempotent unless the port was
          previously set to `never`.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/{type}/{name}/power/inline"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/{type}={name}/power/inline"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/{type}[name={name}]/power/inline"
        firmware_required: ">=17.3"

  - type: PORT_POLICY_PUSH
    description: "Composite port-policy push: portfast + BPDU guard + storm-control + description"
    versions:
      - applies_to: ">=12.2"
        cli: |
          interface {interface}
          spanning-tree portfast
          spanning-tree bpduguard enable
          storm-control broadcast level {storm_control_level}
          storm-control multicast level {storm_control_level}
          description {description}
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          Each line is OPTIONAL — handler `get_port_config_commands`
          accepts kwargs for `portfast`, `bpdu_guard`, `storm_control`,
          `storm_control_level`, `description` and only emits the
          lines for which the corresponding flag/value is truthy.

          The `cli` block above shows the maximum-fanout form; in
          practice a typical operator-approved push is just the
          first three lines (portfast + bpduguard + level).

          Storm-control level format on IOS-XE is a percent in
          decimal form ("1.00" = 1.00% of port bandwidth). Some
          older trains accept absolute pps with `level pps <n>` —
          NetCaster only emits the percent form.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/{type}/{name}"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/{type}={name}"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/{type}[name={name}]"
        firmware_required: ">=17.3"

  # ── Write operations — provisioning ────────────────────────────
  - type: VLAN_CREATE
    description: "Create a VLAN definition (vid + optional name)"
    versions:
      - applies_to: ">=12.0"
        cli: |
          vlan {vlan_id}
           name {name}
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          The `name` line is OPTIONAL — handler omits it if the
          caller doesn't supply a name. Names are restricted to
          32 chars, no spaces (Cisco limit).

          On IOS classic with VTP server mode, VLAN creation
          propagates via VTP — NetCaster does NOT handle the VTP
          implications and assumes VTP transparent mode (the
          recommended posture for venue deployments).
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/vlan/vlan-list"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/vlan/vlan-list={vlan_id}"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/vlan/vlan-list[id={vlan_id}]"
        firmware_required: ">=17.3"

  - type: SVI_CREATE
    description: "Create an SVI for a VLAN with optional IP / DHCP relay / IGMP / PIM"
    versions:
      - applies_to: ">=12.0"
        cli: |
          interface Vlan{vlan_id}
           ip address {ip_address} {netmask}
           ip helper-address {dhcp_server}
           ip igmp join-group 224.0.0.0
           ip pim sparse-mode
           no shutdown
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          Composite: every line after `interface VlanN` is OPTIONAL.
          Handler `get_svi_create_commands` accepts:
            - ip_address (CIDR string e.g. "10.1.30.1/24")
            - gateway_ip / gateway_mac (recorded but unused by IOS;
              kept in the API for cross-vendor symmetry — Aruba uses)
            - dhcp_servers (list[str] — emits one helper-address line each)
            - igmp / pim_sparse (booleans)
          The IP-address conversion CIDR → "ip address X Y" is done
          via `ipaddress.IPv4Interface`.

          `no shutdown` is always emitted — SVIs default to admin-down.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/Vlan/{vlan_id}"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/Vlan={vlan_id}"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/Vlan[name={vlan_id}]"
        firmware_required: ">=17.3"

  - type: STP_VLAN_ENABLE
    description: "Enable spanning-tree for a VLAN"
    versions:
      - applies_to: ">=12.0"
        cli: "spanning-tree vlan {vlan_id}"
        sample_output: ""
        parser_notes: ""
        config_required: ""
        notes: |
          By default STP IS enabled per VLAN on IOS — this command
          only matters as the inverse of `no spanning-tree vlan N`,
          which an operator may have disabled. Used by NetCaster's
          STP-coverage remediation flow to re-enable STP on VLANs
          the venue policy requires.

          Mode (PVST+ vs Rapid-PVST+ vs MSTP) is set via separate
          `spanning-tree mode <mode>` global config; NetCaster does
          not touch the mode and only flips per-VLAN enable.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-spanning-tree"
        data_path: "/native/spanning-tree/vlan"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/spanning-tree/vlan"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/spanning-tree/vlan"
        firmware_required: ">=17.3"

  # ── Persistence ────────────────────────────────────────────────
  - type: SAVE_CONFIG
    description: "Copy running-config to startup-config"
    versions:
      - applies_to: ">=12.0"
        cli: "write memory"
        sample_output: |
          Building configuration...
          [OK]
        parser_notes: |
          Success indicator is the literal "[OK]" on a line by
          itself. Failure shows an error string instead — netmiko
          surfaces the raw output and NetCaster checks for "[OK]".
        config_required: ""
        notes: |
          `write memory` and `copy running-config startup-config`
          are interchangeable on all modern IOS / IOS-XE; the
          existing handler ships `write memory` which is the
          shortest reliable form. Some sandbox/CSR images emit
          additional lines around the [OK]; the parser only
          requires the marker, not exact match.

          On stack masters, the save propagates to all members
          automatically (no per-member action needed).
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IA"
        data_path: "/save-config (RPC)"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/operations/cisco-ia:save-config"
        firmware_required: ">=16.6.1"
      gnmi: null
