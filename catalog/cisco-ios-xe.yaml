# ── Vendor identity ────────────────────────────────────────────────
vendor: cisco_ios
display_name: "Cisco IOS / IOS-XE"
manufacturer: "Cisco Systems"
product_family: "Catalyst / IOS-XE (9000, 3850/3650, 2960, ISR/ASR)"
notes: |
  Single catalog covers IOS classic (12.x / 15.x) and IOS-XE — they
  share command surface for the abstract types in scope. Treat
  IOS-XE 17.x (Cupertino → Dublin → 17.15+) as the baseline; minor
  parser drift on IOS classic is called out per entry.

  The existing NetCaster handler (`netcaster_engine/platforms/cisco_ios.py`)
  hardcodes a single CLI string per command and is firmware-blind. This
  catalog is what a future runtime would consume to pick the right
  CLI / NETCONF / RESTCONF / gNMI implementation per (vendor, firmware,
  abstract command) tuple — closing tech-debt entry #18.

  Notable cross-cutting drift the parser side already half-handles:
  - Cisco-dotted MAC format (xxxx.xxxx.xxxx) is universal across
    IOS / IOS-XE; no version drift.
  - `show ip arp` on IOS classic 12.x has 5 columns (no "Protocol");
    15.x and IOS-XE add it, making 6.
  - `show vlan brief` adds the `act/unsup` status for reserved VLANs
    1002–1005 starting in 15.x; 12.x just shows `active`.
  - `show etherchannel summary` gained the `H` (Hot-standby) flag in
    15.x. Member ports may wrap to continuation lines on stacks with
    >8 members per channel — handler accounts for this.

