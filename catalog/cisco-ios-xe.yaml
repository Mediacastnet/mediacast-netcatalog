# ── Protocol capabilities ──────────────────────────────────────────
# Per Cisco's Open IOS XE FAQ, IOS XE 16.3.1 first shipped NETCONF on
# ASR/ISR; Catalyst 3650/3850 picked it up at 16.5.1b/16.6.2; the
# Catalyst 9000 line shipped with NETCONF from launch (16.6+).
# RESTCONF lit up at 16.6.x. gNMI introduced as a dial-in subscription
# transport in 16.10.1 (Gibraltar); gNMI Set / config support became
# generally usable at 17.3+; PROTO encoding added in 17.11.1.
protocol_capabilities:
  netconf:
    introduced_in: "16.6"
    notes: |
      Originally 16.3.1 on routers; Catalyst-wide baseline is 16.6.
      Requires `netconf-yang` global config. Default port 830/TCP over
      SSH. Use `Cisco-IOS-XE-*-oper` modules for read state, the native
      `Cisco-IOS-XE-native` model for config.
  restconf:
    introduced_in: "16.6"
    notes: |
      Requires `restconf` global config and an HTTPS server
      (`ip http secure-server`). Default JSON encoding via
      `Accept: application/yang-data+json`. URL prefix
      `/restconf/data/`.
  gnmi:
    introduced_in: "16.10"
    notes: |
      Introduced in IOS-XE Gibraltar 16.10.1 as a dial-in telemetry
      transport (Subscribe). Get/Set RPCs and full config reach were
      hardened through 17.3–17.6. gRPC default TCP/9339; enable with
      `gnmi-yang` and `gnmi-yang server`. PROTO encoding added in
      17.11.1; JSON_IETF is the broadly-portable default.

# ── Commands ───────────────────────────────────────────────────────
commands:

  # ── Read operations ────────────────────────────────────────────
  - type: ARP_TABLE
    description: "Display the ARP table"
    versions:
      - applies_to: ">=15.0"
        cli: "show ip arp"
        sample_output: |
          Protocol  Address          Age (min)  Hardware Addr   Type   Interface
          Internet  10.0.0.1                -   001b.5377.fbe1  ARPA   Vlan10
          Internet  10.0.0.42               0   aabb.cc00.0001  ARPA   GigabitEthernet1/0/24
          Internet  10.0.0.55               9   0000.0c59.f892  ARPA   Vlan10
        parser_notes: |
          6 columns space-separated. Hardware Addr is Cisco-dotted
          (xxxx.xxxx.xxxx). Age "-" = router's own interface (never
          ages); "Incomplete" = unresolved entry. Strip the header
          row before iterating. Existing handler regex anchors on
          "Internet" then captures IP / Age (digits or "-") / MAC.
        config_required: ""
        notes: |
          Handler ships `show ip arp`; the catalog matches.
          NetCaster also accepts `show arp` (alias) but the canonical
          form is `show ip arp`.
      - applies_to: ">=12.0,<15.0"
        cli: "show ip arp"
        sample_output: |
          Internet  171.69.233.22       9  0000.0c59.f892  ARPA  Ethernet0/0
        parser_notes: |
          IOS classic 12.x has the same column set but no header row
          on some images. The "Internet"-anchored regex still works.
        config_required: ""
        notes: |
          Marked unverified for 12.x — captured from Cisco's legacy
          command reference; modern lab fleet rarely runs 12.x.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-arp-oper"
        data_path: "/arp-data/arp-vrf/arp-oper"
        firmware_required: ">=16.11.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-arp-oper:arp-data"
        firmware_required: ">=16.11.1"
      gnmi:
        path: "/Cisco-IOS-XE-arp-oper:arp-data"
        firmware_required: ">=17.3"

  - type: MAC_TABLE
    description: "Display the MAC address table"
    versions:
      - applies_to: ">=15.0"
        cli: "show mac address-table"
        sample_output: |
          Mac Address Table
          -------------------------------------------

          Vlan    Mac Address       Type        Ports
          ----    -----------       --------    -----
           All    0100.0ccc.cccc    STATIC      CPU
             1    aabb.cc00.0001    DYNAMIC     Gi1/0/24
           100    9c54.1631.8bd1    DYNAMIC     Te2/1/1
           129    7483.c279.3a4c    DYNAMIC     Gi1/0/14
          Total Mac Addresses for this criterion: 4
        parser_notes: |
          4 columns. VLAN can be numeric or "All" (system entries
          like CPU broadcast — skip these). MAC is Cisco-dotted.
          Type ∈ {DYNAMIC, STATIC, SECURE}. Ports = single
          interface for unicast; "CPU" / "Drop" for system entries.
          Existing handler regex requires VLAN to be \d+, which
          implicitly skips "All" / "Drop" / "CPU" rows.
        config_required: ""
        notes: |
          IOS classic ≤ 12.1 used `show mac-address-table`
          (hyphenated, no space). 15.x onward both forms are
          accepted but `show mac address-table` is canonical.
      - applies_to: ">=12.0,<15.0"
        cli: "show mac-address-table"
        sample_output: |
          Dynamic Address Count:                 12
          Secure Address Count:                   0
          Static  Address (User-defined) Count:   0
          System Self Address Count:             16

          Non-source Miss Address Count:          0
          Total MAC addresses:                   28

          Non-static Address Table:
          Destination Address  Address Type  VLAN  Destination Port
          -------------------  ------------  ----  --------------------
          0010.0d40.37ff       Dynamic         1   FastEthernet0/1
        parser_notes: |
          Different column order on classic 12.x; the existing
          handler does NOT parse this format — kept for catalog
          completeness. Marked unverified.
        config_required: ""
        notes: "Deprecated form — only relevant for legacy 2950/3550 stacks."
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-matm-oper"
        data_path: "/matm-oper-data/matm-table/matm-mac-entry"
        firmware_required: ">=16.12.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-matm-oper:matm-oper-data"
        firmware_required: ">=16.12.1"
      gnmi:
        path: "/Cisco-IOS-XE-matm-oper:matm-oper-data"
        firmware_required: ">=17.3"

  - type: NEIGHBOR_DETAIL
    description: "CDP neighbor detail (Cisco's preferred discovery protocol)"
    versions:
      - applies_to: ">=12.0"
        cli: "show cdp neighbors detail"
        sample_output: |
          -------------------------
          Device ID: switch-edge-12.example.com
          Entry address(es):
            IP address: 10.1.1.42
          Platform: cisco WS-C3850-48P,  Capabilities: Router Switch IGMP
          Interface: TenGigabitEthernet2/1/1,  Port ID (outgoing port): TenGigabitEthernet1/1/2
          Holdtime : 174 sec

          Version :
          Cisco IOS Software, IOS-XE Software, Catalyst L3 Switch Software (CAT3K_CAA-UNIVERSALK9-M), Version 16.12.7

          advertisement version: 2
          Duplex: full
          Management address(es):
            IP address: 10.1.1.42

          -------------------------
          Device ID: ap-floor-2.example.com
          Entry address(es):
            IP address: 10.1.99.50
          Platform: cisco AIR-AP3802I-B-K9, Capabilities: Trans-Bridge
          Interface: GigabitEthernet1/0/24,  Port ID (outgoing port): GigabitEthernet0
        parser_notes: |
          Neighbor blocks separated by lines of dashes (≥10).
          Per-block fields:
            Device ID:     <fqdn or hostname>
            IP address:    <ipv4>          (under "Entry address(es):" or "Management address(es):")
            Platform:      <model>,        (comma terminates the model, then Capabilities)
            Capabilities:  <list>          (after the comma on the Platform line, or its own field)
            Interface:     <local intf>,   (TRAILING COMMA — strip it; Cisco's quirk)
            Port ID (outgoing port): <remote intf>
          Existing handler strips the trailing comma off the local
          interface name — without that fix, port-channel-member
          mapping fails because "Te2/1/1," ≠ "Te2/1/1".
        config_required: "cdp run\n"
        notes: |
          CDP is a Cisco-proprietary L2 discovery protocol; default-on
          on IOS/IOS-XE. Some hardened deployments disable CDP — the
          engine falls back to LLDP via `LLDP_DETAIL`.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-cdp-oper"
        data_path: "/cdp-neighbor-details/cdp-neighbor-detail"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-cdp-oper:cdp-neighbor-details"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-cdp-oper:cdp-neighbor-details"
        firmware_required: ">=17.3"

  - type: LLDP_DETAIL
    description: "LLDP neighbor detail (used as fallback when CDP is off, or for non-Cisco neighbors)"
    versions:
      - applies_to: ">=12.2"
        cli: "show lldp neighbors detail"
        sample_output: |
          ------------------------------------------------
          Local Intf: Gi1/0/12
          Chassis id: 001b.5377.fbe1
          Port id: Gi0/24
          Port Description: uplink to dist-12
          System Name: dist-12.example.com

          System Description:
          Cisco IOS Software, C3560 Software (C3560-IPSERVICESK9-M), Version 15.0(2)SE11

          Time remaining: 95 seconds
          System Capabilities: B,R
          Enabled Capabilities: B,R
          Management Addresses:
            IP: 10.1.1.50
        parser_notes: |
          Same dashed-line block separator as CDP. Field labels differ:
            Local Intf:   <local intf>
            Port id:      <remote intf>      (lowercase "id")
            System Name:  <fqdn>
            Management Addresses:\n  IP: <ipv4>   (or "Management Address: <ipv4>")
            System Description: <multi-line until blank line>
        config_required: "lldp run\n"
        notes: |
          LLDP is OFF by default on IOS/IOS-XE — must explicitly
          `lldp run` globally. Default-off bites discovery audits
          when CDP is disabled but LLDP wasn't enabled. Captured as
          gotcha in handler comments.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-lldp-oper"
        data_path: "/lldp-entries/lldp-entry"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-lldp-oper:lldp-entries"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-lldp-oper:lldp-entries"
        firmware_required: ">=17.3"

  - type: PORT_CHANNEL_MEMBERS
    description: "Map port-channel logical interfaces to physical members"
    versions:
      - applies_to: ">=12.2"
        cli: "show etherchannel summary"
        sample_output: |
          Flags:  D - down        P - bundled in port-channel
                  I - stand-alone s - suspended
                  H - Hot-standby (LACP only)
                  R - Layer3      S - Layer2
                  U - in use      f - failed to allocate aggregator

                  M - not in use, minimum links not met
                  u - unsuitable for bundling
                  w - waiting to be aggregated
                  d - default port

                  A - formed by Auto LAG

          Number of channel-groups in use: 2
          Number of aggregators:           2

          Group  Port-channel  Protocol    Ports
          ------+-------------+-----------+-----------------------------------------------
          1      Po1(SU)         LACP      Gi1/0/49(P)  Gi1/0/50(P)
          2      Po2(SU)         LACP      Te1/0/1(P)   Te1/0/2(P)   Te2/1/1(P)
                                            Te2/1/2(P)
        parser_notes: |
          Fixed-width-ish columns; Group is leading whitespace +
          digits. Port-channel is "Po<n>(<flags>)". Members on the
          same line as the header AND continuation lines (indented
          past the Group column with no leading digit). Member flags
          in parens: P=bundled, s=suspended, D=down, H=hot-standby.
          Existing handler captures all members regardless of flag —
          CDP/LLDP may still be reported on suspended members.
        config_required: ""
        notes: |
          IOS-XE on Catalyst 9000 ALSO accepts `show port-channel
          summary` as an alias starting in 16.6+; output is identical.
          The H (Hot-standby) flag was introduced with LACP support
          in 12.2(33)SXH on Cat6500 and is universal on modern IOS-XE.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-etherchannel-oper"
        data_path: "/etherchannel-data"
        firmware_required: ">=17.1.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-etherchannel-oper:etherchannel-data"
        firmware_required: ">=17.1.1"
      gnmi: null

  - type: INTERFACE_CONFIG
    description: "Show running-config for a single interface"
    versions:
      - applies_to: ">=12.0"
        cli: "show running-config interface {interface}"
        sample_output: |
          Building configuration...

          Current configuration : 312 bytes
          !
          interface GigabitEthernet1/0/24
           description AP-Drop-203
           switchport access vlan 30
           switchport mode access
           switchport voice vlan 31
           power inline auto
           spanning-tree portfast
           spanning-tree bpduguard enable
           storm-control broadcast level 1.00
          end
        parser_notes: |
          Multi-line; one config-mode statement per indented line.
          The handler's bulk parser (`parse_interface_configs`)
          extracts portfast / bpduguard / storm-control / description /
          location civic-location-id via per-line regexes.
        config_required: ""
        notes: |
          Per-interface form is slow on big stacks. NetCaster prefers
          `INTERFACE_CONFIG_BULK` for inventory; this single form is
          used in venue-compliance drilldown and in port-action
          pre-write verification.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface/{type}/{name}"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface/{type}={name}"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface/{type}[name={name}]"
        firmware_required: ">=17.3"

  - type: INTERFACE_CONFIG_BULK
    description: "Show all interface running-config sections in one shot"
    versions:
      - applies_to: ">=15.0"
        cli: "show running-config | section ^interface"
        sample_output: |
          interface GigabitEthernet1/0/1
           description Phone-101
           switchport access vlan 30
           switchport voice vlan 31
           spanning-tree portfast
           spanning-tree bpduguard enable
          !
          interface GigabitEthernet1/0/2
           description AP-Floor-2
           switchport access vlan 30
           power inline auto
           location civic-location-id 1
          !
          interface Vlan30
           ip address 10.1.30.1 255.255.255.0
        parser_notes: |
          Splits on `(?=^interface\s)` MULTILINE. Per-block regexes
          extract the same fields as INTERFACE_CONFIG. Note that
          `interface Vlan<n>` blocks ALSO match — handler relies on
          this to feed SVI parsing too, but in practice
          SVI_CONFIG uses a separate filter to keep parsing clean.
        config_required: ""
        notes: |
          The `| section ^interface` filter is IOS-XE / 15.x; classic
          12.x lacks `| section` and has to use `| begin interface`
          which captures everything after the first interface block.
          Catalog flags this as a 15.0 minimum.
      - applies_to: ">=12.0,<15.0"
        cli: "show running-config | begin interface"
        sample_output: |
          interface GigabitEthernet0/1
           switchport access vlan 30
           spanning-tree portfast
          !
          (... continues through end of running-config ...)
        parser_notes: "Same per-block parse but caller must trim trailing global config."
        config_required: ""
        notes: "Marked unverified — modern fleet runs 15.x+."
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-native"
        data_path: "/native/interface"
        firmware_required: ">=16.6.1"
      restconf:
        url_path: "/restconf/data/Cisco-IOS-XE-native:native/interface"
        firmware_required: ">=16.6.1"
      gnmi:
        path: "/Cisco-IOS-XE-native:native/interface"
        firmware_required: ">=17.3"

  - type: INTERFACE_STATS
    description: "Detailed interface state and counters"
    versions:
      - applies_to: ">=12.0"
        cli: "show interface {interface}"
        sample_output: |
          GigabitEthernet1/0/1 is up, line protocol is up (connected)
            Hardware is Gigabit Ethernet, address is aabb.cc00.0001 (bia aabb.cc00.0001)
            Description: AP-Drop-203
            MTU 1500 bytes, BW 1000000 Kbit/sec, DLY 10 usec,
               reliability 255/255, txload 1/255, rxload 1/255
            Encapsulation ARPA, loopback not set
            Keepalive set (10 sec)
            Full-duplex, 1000Mb/s, media type is 10/100/1000BaseTX
            input flow-control is off, output flow-control is unsupported
            Auto-MDIX on (operational: on)
            ARP type: ARPA, ARP Timeout 04:00:00
            Last input 00:00:00, output 00:00:00, output hang never
            Last clearing of "show interface" counters never
            Input queue: 0/2000/0/0 (size/max/drops/flushes); Total output drops: 0
            Queueing strategy: fifo
            Output queue: 0/40 (size/max)
            5 minute input rate 12000 bits/sec, 22 packets/sec
            5 minute output rate 8000 bits/sec, 14 packets/sec
            30 second input rate 11000 bits/sec, 21 packets/sec
            30 second output rate 7000 bits/sec, 13 packets/sec
               1234567 packets input, 891234567 bytes, 0 no buffer
               Received 12345 broadcasts (0 IP multicasts)
               0 runts, 0 giants, 0 throttles
               0 input errors, 0 CRC, 0 frame, 0 overrun, 0 ignored
               0 watchdog, 0 multicast, 0 pause input
               0 input packets with dribble condition detected
               9876543 packets output, 4567890123 bytes, 0 underruns
               0 output errors, 0 collisions, 1 interface resets
        parser_notes: |
          The handler's `parse_interface_stats` extracts:
            - status / line-protocol from line 1
            - description (optional)
            - 30-second input/output rate (bps + pps)
            - 5-minute input/output rate (bps) — IOS-XE only
            - input/output packet totals
            - input/output errors, CRC errors
          Parser tolerates missing 5-minute rates for classic IOS.
        config_required: ""
        notes: |
          Format is stable across IOS / IOS-XE 12.x → 17.x with the
          notable exception that 5-minute rate lines are IOS-XE-only.
    protocol_alternatives:
      netconf:
        yang_model: "Cisco-IOS-XE-interfaces-oper"
        data_path: "/interfaces/interface"
        firmware_required: ">=16.6.1"
