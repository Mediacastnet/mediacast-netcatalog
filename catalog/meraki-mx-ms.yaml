# ── Vendor identity ────────────────────────────────────────────────
vendor: meraki_ms
display_name: "Cisco Meraki MS (cloud-managed switching)"
manufacturer: "Cisco Meraki"
product_family: "MS series cloud-managed switches"
notes: |
  *** SCHEMA STRETCH WARNING — read this before consuming the file. ***

  Meraki MS is fundamentally different from every other vendor in this
  catalog. The switches are CLOUD-MANAGED. There is no traditional CLI
  for management operations. Operators interact with switches via:

    1. The Meraki Dashboard web UI (interactive operators), and
    2. The Meraki Dashboard API — a REST + JSON over HTTPS API hosted
       at https://api.meraki.com/api/v1 (programmatic / automation).

  To make Meraki even loosely fit this catalog's schema, we deliberately
  stretch the `cli` field: instead of a CLI string, the `cli` field
  contains the Dashboard API endpoint expressed as `METHOD /path` (e.g.,
  `GET /devices/{serial}/clients`). This is documented here so any
  future runtime catalog loader treats Meraki as a special case rather
  than trying to ship the string to a Netmiko session.

  A LOCAL CLI EXISTS on each MS switch but is intentionally restricted.
  It's reachable via the local status page (default: serial-number
  username, blank password) and exposes only diagnostic tools — `ping`,
  `traceroute`, `mtr`, `packet capture`, event logs. It is NOT a
  management plane: you cannot configure VLANs, change port settings,
  or save config from it. NetCaster has no reason to use it for any
  abstract command type in this catalog. References to "local CLI"
  below mean exactly this restricted diagnostic shell.

  Operations that target Meraki "networks" rather than a specific
  switch (VLAN_CREATE on the appliance side, STP_VLAN_ENABLE network-
  wide) reflect Meraki's model: VLANs are network constructs, switch
  templates / profiles inherit them, individual switch ports reference
  the VLAN ID. There's no per-switch `vlan 100` provisioning step.

  Many provisioning concepts in the catalog don't translate. SVI
  creation exists per-switch via routing/interfaces (uncommon — most
  Meraki deployments use MX appliances for L3). VLAN creation on
  switching is via Network VLAN Profiles or per-port `vlan` field, not
  a global switch VLAN database. STP is network-wide RSTP only — no
  per-VLAN spanning-tree concept.

  Meraki firmware is continuously rolled by Cisco on a network-by-
  network schedule; operators don't pin a specific version the way they
  do on IOS-XE. The "version" string most analogous to `show version`
  output is `firmware` returned by `GET /organizations/{orgId}/devices`
  alongside `productType` and `model`. This is documented under
  the VERSION command entry below.

