# Aruba AOS-CX vendor command catalog
# Mirrors netcaster_engine/platforms/aruba_aoscx.py and adds firmware-version awareness.
# Treat 10.10 as the practical baseline; the existing handler is validated against
# the 6300/6400/8320/8325/8400/10000 series running 10.10вЂ“10.13.

# в”Ђв”Ђ Vendor identity в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
vendor: aruba_aoscx
display_name: "Aruba AOS-CX"
manufacturer: "Hewlett Packard Enterprise (HPE Aruba Networking)"
product_family: "CX 4100i / 5420 / 6000 / 6100 / 6200 / 6300 / 6400 / 8100 / 8320 / 8325 / 8360 / 9300 / 10000"
notes: |
  Modern Aruba CX line вЂ” distinct from the legacy ProCurve / ArubaOS-Switch family
  which lives in a separate catalog (`hpe-procurve.yaml`). Interface naming is
  `member/slot/port` (e.g., `1/1/24`); breakout ports add a `:N` suffix
  (`1/1/2:1`). LAGs are `lagN`. SVIs are `vlanN` (no separator) when used as
  an interface name in `show running-config interface`, but `interface vlan N`
  in config mode (the parsers tolerate both spellings).

  Programmability story (relevant to ADR-0018 / hybrid protocol read path):
    - **REST API** is the primary programmatic interface. Auto-generated from
      AOS-CX's internal data model; v10.04 introduced the structured API in
      AOS-CX 10.04. v10.04 + v10.08вЂ“v10.16 are concurrently supported on
      modern firmware. Legacy `rest/v1` was deprecated at 10.09 and removed
      at 10.12 вЂ” do not target v1.
    - **NETCONF** is NOT a first-class interface on AOS-CX. The
      `aruba/aoscx-yang` repo publishes YANG models, but NETCONF transport
      coverage is sparse and version-specific; the official
      device-programmability story is "use REST or pyaoscx". Treat NETCONF
      as effectively unsupported for this catalog.
    - **gNMI** lands in AOS-CX 10.17 (announced/released early 2026 on
      6300/6400/8xxx/9300/10000 monitoring docs). Subscription-mode
      streaming telemetry against a subset of OpenConfig models. Pre-10.17,
      no gNMI.

  This makes AOS-CX the weakest leg of the protocol-based-I/O story relative
  to Cisco IOS-XE (NETCONF/RESTCONF/gNMI all available since 16.6/16.10) and
  NX-OS (NETCONF since 7.x, gNMI since 9.3). The catalog reflects that
  honestly вЂ” most reads list REST as the only viable alternative, and gNMI is
  gated on `>=10.17`.

