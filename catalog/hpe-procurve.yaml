# ── Vendor identity ────────────────────────────────────────────────
vendor: hpe_procurve
display_name: "HPE / Aruba ProCurve / ArubaOS-Switch (legacy)"
manufacturer: "Hewlett Packard Enterprise (Aruba Networks)"
product_family: "ProCurve / ArubaOS-Switch (a.k.a. Provision OS)"
notes: |
  This is the LEGACY Aruba switching line — distinct from AOS-CX.
  Covers HP/HPE ProCurve and ArubaOS-Switch (sometimes branded
  "Provision OS"). Common installed-base models: 2530, 2920, 2930F,
  2930M, 3810M, 5400R / zl2. Firmware version strings are typically
  shaped like `WC.16.10.0021`, `KB.16.10.0021`, `YA.16.10.0021`,
  `YB.16.10.0021`, where the two-letter prefix denotes the platform
  family and the rest is the train + build (e.g. 16.10.0021).

  Treat 16.08 as the realistic baseline for REST-API-driven
  automation; 16.10 / 16.11 broaden the REST surface (MAC table,
  better auth). For pre-16.x firmware (e.g. K.15.x on older 5400zl),
  CLI is the only programmatic surface — REST is absent.

  Major divergences from Cisco / AOS-CX you must internalize before
  parsing:
    - Interface naming is bare port number (e.g. `24`) or a slot
      letter + number on chassis switches (e.g. `A1`, `B12`). Trunks
      (LAGs) are `Trk1`, `Trk2`, … — not `Port-channel1`.
    - `show vlans` (note the trailing `s`) is the canonical VLAN
      listing — not `show vlan brief`.
    - VLAN port membership is `tagged` / `untagged` from inside the
      `vlan <id>` config context; there is no Cisco-style
      `switchport access vlan` / `switchport trunk` on access ports.
    - "Trunk" on ProCurve means LAG (link aggregation), NOT 802.1Q
      tagged uplink. Do not conflate the two when reading docs or
      generating commands.
    - Persistence is `write memory` (`wr mem`). There is no
      `copy running-config startup-config` — that is Cisco syntax.
    - PoE syntax (`power-over-ethernet` / `no power-over-ethernet`)
      coincidentally matches AOS-CX, since AOS-CX inherited it.

  PROTOCOL GAP — read this before planning a programmatic-read path:
    - NETCONF / YANG: NOT supported. Aruba never delivered NETCONF
      on the ProCurve / ArubaOS-Switch line. NETCONF on Aruba only
      arrived with AOS-CX.
    - gNMI / OpenConfig: NOT supported. Same story.
    - RESTCONF: NOT supported.
    - REST API (Aruba's proprietary JSON API): introduced and matured
      across the 16.x trains. Pre-16.x, the only programmatic surface
      is SNMP + CLI screen-scraping.
    - SNMP v2c / v3: supported across all firmware in scope, and is
      historically the dominant management plane for ProCurve. For
      command types where REST coverage is thin, SNMP (with the
      classic IETF MIBs — IF-MIB, BRIDGE-MIB, IP-MIB, LLDP-MIB) is
      typically the better non-CLI fallback.

  All `protocol_alternatives` blocks below reflect the ProCurve REST
  API only. NETCONF / gNMI are uniformly null and should be treated
  as architecturally absent on this platform — do not re-research.

