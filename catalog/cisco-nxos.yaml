# ── Vendor identity ────────────────────────────────────────────────
vendor: cisco_nxos
display_name: "Cisco NX-OS (Nexus)"
manufacturer: "Cisco Systems"
product_family: "Nexus 9000 / 7000 / 5000"
notes: |
  Single catalog covers Cisco Nexus data-center switches running NX-OS:
  Nexus 9000 (9300/9500), Nexus 7000/7700, Nexus 5500/5600, Nexus 3000.
  Treat NX-OS 9.3(x) as the baseline for NetCaster's existing handler;
  10.x is the current shipping line. Per-command notes call out drift.

  NX-OS deviates from IOS / IOS-XE in several places that matter for
  parsers:
    - Interface naming: `Ethernet1/24` (NX-OS) vs `GigabitEthernet1/0/24`
      (IOS). Port-channels are lowercase `port-channel1`, not `Port-channel1`.
    - PortFast equivalent is `spanning-tree port type edge`, not
      `spanning-tree portfast`.
    - `show mac address-table` includes a leading flag column
      (`*`, `+`, `G`, `R`, `~`, `O`, `C`) and extra `age`/`Secure`/`NTFY`
      columns absent on IOS.
    - `show ip arp` has no "Internet"/"ARPA" type columns; age is
      HH:MM:SS instead of minutes.
    - `show etherchannel summary` (IOS) is `show port-channel summary`
      on NX-OS.
    - SVIs are `interface Vlan<n>` (same syntax form, but the SVI feature
      requires `feature interface-vlan` first).
    - DHCP relay is `ip dhcp relay address <ip>`, not
      `ip helper-address <ip>` as on IOS.
    - vPC: when a port-channel is a vPC member, write changes to its
      member interfaces must be applied *symmetrically* on both vPC
      peers, or the consistency checker will suspend the vPC. NetCaster
      currently restricts writes to clean access ports — vPC member
      interfaces are auto-excluded by the safe-path check, so no extra
      vPC-specific commands are needed in this catalog. Reads
      (`show port-channel summary`, `show vpc`) are unaffected.
    - PoE: only specific Nexus 9300-FX/FX2/FX3 SKUs ship PoE-capable
      ports. Most data-center Nexus models are not PoE-bearing. PoE
      commands here apply where the platform supports it; on
      non-PoE Nexus, the commands are accepted with no effect.
    - NX-OS does NOT auto-save changes; an explicit
      `copy running-config startup-config` is required for persistence.

